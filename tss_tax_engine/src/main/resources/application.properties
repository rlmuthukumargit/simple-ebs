spring.application.name=custom-tax-engine
server.port=8080

# ============================
# - DESERIALIZATION CUSTOMIZATION
# ============================
spring.jackson.deserialization.USE_BIG_DECIMAL_FOR_FLOATS=true

#Disable Load Balancer
spring.cloud.loadbalancer.enabled=false

#AVALARA Client Configuration
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=full
feign.client.config.default.requestInterceptors=com.bp.custom.tax.interceptors.BasicAuth

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.tracing.sampling.probability=1.0

logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){blue} %clr(%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]){yellow} %clr(:){red} %clr(%m){faint}%n

# Resilience4j circuit breaker defaults (tune for your workload)
resilience4j.circuitbreaker.instances.avataxClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.avataxClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.avataxClient.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.avataxClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.avataxClient.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.avataxClient.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.avataxClient.eventConsumerBufferSize=10

spring.profiles.default=dev
