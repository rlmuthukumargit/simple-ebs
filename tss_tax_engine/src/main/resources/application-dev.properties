logging.level.org.springframework=INFO

# Elastic Beanstalk Health Endpoints
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Feign Client URL
spring.cloud.openfeign.client.config.avalara.url=https://sandbox-rest.avatax.com/api/v2/transactions
spring.cloud.openfeign.client.config.avalara.loggerLevel=full
basic.auth.username=USER
basic.auth.password=PASS

# Properties for Oracle Universal Connection Pool
spring.datasource.type=oracle.ucp.jdbc.PoolDataSource
spring.datasource.oracleucp.connection-pool-name=ShopLegacyPool
spring.datasource.oracleucp.initial-pool-size=1
spring.datasource.oracleucp.min-pool-size=1
spring.datasource.oracleucp.max-pool-size=3
spring.datasource.oracleucp.connection-factory-class-name=oracle.jdbc.pool.OracleDataSource

# Database & JPA Configuration
spring.datasource.url=${dburl}
spring.datasource.username=${dbusername}
spring.datasource.password=${dbpassword}
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# --- AWS Secrets Manager (Spring Cloud AWS 3.x Optimized) ---
spring.cloud.aws.region.static=us-east-2
spring.cloud.aws.secretsmanager.enabled=true

# Import secret by name (region is set above via spring.cloud.aws.region.static)
spring.config.import=optional:aws-secretsmanager:TSS_SalesTax_Ora_Dev01
