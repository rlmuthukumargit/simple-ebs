resources:
  repositories:
  - repository: tss_tax_engine
    type: git
    name: M_C_Americas_TravelCenters/tss_tax_engine
    ref: refs/heads/develop
    trigger:
      branches:
        include:
          - develop

# Defines a timestamped BuildNumber format: e.g., 20260403-124530-123
name: $(Date:yyyyMMdd-HHmmss)-$(Build.BuildId)

trigger: none
pr: none

pool:
  name: GenericPoolLinux-ss

parameters:
  - name: ENVIRONMENT
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod
  - name: AWS_SERVICE_CONNECTION
    type: string
    default: 'ws-038-testing'
  - name: AWS_ROLE_NAME
    type: string
    default: 'WS-038U-role_AUTOMATION'
  - name: AWS_REGION
    type: string
    default: 'us-east-1'

stages:
  - stage: Build_Spring_Boot
    displayName: 'Build'
    jobs:
      - job: Build
        displayName: 'Maven Build'
        pool:
          name: GenericPoolLinux-ss
        steps:
          - checkout: self
            path: '.'
          - checkout: tss_tax_engine
          - task: Maven@3
            displayName: 'Build JAR'
            inputs:
              mavenPomFile: '$(Build.SourcesDirectory)/tss_tax_engine/pom.xml'
              goals: 'clean package -DskipTests'
              publishJUnitResults: false
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '21'
              mavenVersionOption: 'Default'
              mavenAuthenticateFeed: false
              effectivePomSkip: false
              sonarQubeRunAnalysis: false

          - bash: |
              mkdir -p $(Build.ArtifactStagingDirectory)/eb-bundle/.platform/nginx/conf.d/
              # Copy files from the tss_tax_engine folder
              cp -r $(Build.SourcesDirectory)/tss_tax_engine/.platform $(Build.ArtifactStagingDirectory)/eb-bundle/
              cp -r $(Build.SourcesDirectory)/tss_tax_engine/.ebextensions $(Build.ArtifactStagingDirectory)/eb-bundle/ || true
              cp $(Build.SourcesDirectory)/tss_tax_engine/Procfile $(Build.ArtifactStagingDirectory)/eb-bundle/ || true
              # Rename the JAR to application.jar
              cp $(Build.SourcesDirectory)/tss_tax_engine/target/*.jar $(Build.ArtifactStagingDirectory)/eb-bundle/application.jar
            displayName: 'Prepare Elastic Beanstalk Bundle'

          - task: ArchiveFiles@2
            displayName: 'Create ZIP Deployment Bundle'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/eb-bundle'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/deploy-bundle.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/deploy-bundle.zip'
              ArtifactName: 'drop'
              publishLocation: 'Container'

          - task: BPAES.bp-aws.bp-aws-auth.awsTokenBroker@1
            displayName: 'Login to AWS to Archive'
            inputs:
              serviceConnection: ${{ parameters.AWS_SERVICE_CONNECTION }}
              roleName: ${{ parameters.AWS_ROLE_NAME }}
              region: ${{ parameters.AWS_REGION }}

          - bash: |
              # Extract bucket from env tfvars
              BUCKET=$(grep "s3_bucket" environments/${{ parameters.ENVIRONMENT }}/${{ parameters.ENVIRONMENT }}.tfvars | awk -F'=' '{print $2}' | tr -d ' "' | xargs)
              if [ -z "$BUCKET" ]; then
                BUCKET="ws-038u-salestax-iac-us-east-2"
              fi
              echo "Uploading to extracted S3 Bucket: $BUCKET"
              # Upload versioned file
              aws s3 cp $(Build.ArtifactStagingDirectory)/deploy-bundle.zip s3://$BUCKET/app/deploy-v$(Build.BuildNumber).zip
              # Upload latest.zip fallback
              aws s3 cp $(Build.ArtifactStagingDirectory)/deploy-bundle.zip s3://$BUCKET/app/latest.zip
            displayName: 'Upload to S3 Archive'

  - stage: Terraform_Infrastructure
    displayName: 'Infrastructure'
    dependsOn: Build_Spring_Boot
    jobs:
      - job: Terraform_Job
        displayName: 'Terraform Management'
        pool:
          name: GenericPoolLinux-ss
        steps:
          - checkout: self
            path: '.'

          - task: JasonBJohnson.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-installer.TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - bash: |
              if ! aws --version ; then
                curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
                unzip -qq awscliv2.zip
                sudo ./aws/install --update
              fi
            displayName: 'Install AWS CLI'

          - task: BPAES.bp-aws.bp-aws-auth.awsTokenBroker@1
            displayName: 'Login to AWS'
            retryCountOnTaskFailure: 5
            inputs:
              serviceConnection: ${{ parameters.AWS_SERVICE_CONNECTION }}
              roleName: ${{ parameters.AWS_ROLE_NAME }}
              region: ${{ parameters.AWS_REGION }}

          - bash: |
              terraform init -backend-config="environments/${{ parameters.ENVIRONMENT }}/${{ parameters.ENVIRONMENT }}.backend"
            displayName: 'Terraform Init'

          - bash: |
              # Extract bucket from env tfvars
              BUCKET=$(grep "s3_bucket" environments/${{ parameters.ENVIRONMENT }}/${{ parameters.ENVIRONMENT }}.tfvars | awk -F'=' '{print $2}' | tr -d ' "' | xargs)
              if [ -z "$BUCKET" ]; then BUCKET="ws-038u-salestax-iac-us-east-2"; fi
              
              VERSIONED_KEY="app/deploy-v$(Build.BuildNumber).zip"
              LATEST_KEY="app/latest.zip"
              DEFAULT_KEY="app/application.zip"

              # Triple Fallback Logic
              if aws s3 ls "s3://$BUCKET/$VERSIONED_KEY" > /dev/null 2>&1; then
                echo "Found fresh versioned artifact: $VERSIONED_KEY"
                S3_KEY=$VERSIONED_KEY
              elif aws s3 ls "s3://$BUCKET/$LATEST_KEY" > /dev/null 2>&1; then
                echo "Fresh version not found. Falling back to LATEST: $LATEST_KEY"
                S3_KEY=$LATEST_KEY
              else
                echo "No build artifacts found. Using stable default: $DEFAULT_KEY"
                S3_KEY=$DEFAULT_KEY
              fi

              terraform plan -var-file="environments/${{ parameters.ENVIRONMENT }}/${{ parameters.ENVIRONMENT }}.tfvars" \
                -var="s3_bucket=$BUCKET" \
                -var="s3_key=$S3_KEY"
            displayName: 'Terraform Plan'

          - bash: |
              # Re-extract for safety in separate bash step
              BUCKET=$(grep "s3_bucket" environments/${{ parameters.ENVIRONMENT }}/${{ parameters.ENVIRONMENT }}.tfvars | awk -F'=' '{print $2}' | tr -d ' "' | xargs)
              if [ -z "$BUCKET" ]; then BUCKET="ws-038u-salestax-iac-us-east-2"; fi
              
              VERSIONED_KEY="app/deploy-v$(Build.BuildNumber).zip"
              LATEST_KEY="app/latest.zip"
              DEFAULT_KEY="app/application.zip"

              if aws s3 ls "s3://$BUCKET/$VERSIONED_KEY" > /dev/null 2>&1; then
                S3_KEY=$VERSIONED_KEY
              elif aws s3 ls "s3://$BUCKET/$LATEST_KEY" > /dev/null 2>&1; then
                S3_KEY=$LATEST_KEY
              else
                S3_KEY=$DEFAULT_KEY
              fi

              terraform apply -var-file="environments/${{ parameters.ENVIRONMENT }}/${{ parameters.ENVIRONMENT }}.tfvars" \
                -var="s3_bucket=$BUCKET" \
                -var="s3_key=$S3_KEY" \
                -auto-approve
            displayName: 'Terraform Apply'

